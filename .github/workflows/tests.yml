# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: Tests

env:
#  ANSIBLE_VERBOSITY: 3
  MITOGEN_LOG_LEVEL: DEBUG

on:
  pull_request:
  push:
    branches-ignore:
      - docs-master

# https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners
# https://github.com/actions/runner-images/blob/main/README.md#software-and-image-support
jobs:
  u2404:
    name: u2404 ${{ matrix.tox_env }}
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          # - tox_env: py315-m_ans-ans14
          #   python_version: '3.15.0-beta.2'

          # - tox_env: py315-m_ans-ans14-s_lin
          #   python_version: '3.15.0-beta.2'

          - tox_env: py315-m_mtg
            python_version: '3.15.0-beta.2'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
        if: ${{ matrix.python_version }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: .ci/show_python_versions
      - run: .ci/setup_ssh_key_mitogen__has_sudo_pubkey
      - run: .ci/setup_sudoers_defaults
        if: ${{ contains(matrix.tox_env, 'm_mtg') }}
      - name: Install deps
        id: install-deps
        run: |
          set -o errexit -o nounset -o pipefail
          source .ci/bash_functions
          PYTHON="$(toxenv-python '${{ matrix.tox_env }}')"

          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libxml2-dev libxslt1-dev sshpass virtualenv

          "$PYTHON" -m pip install -r "tests/requirements-tox.txt"
          echo "python=$PYTHON" >> $GITHUB_OUTPUT
      - name: Create environments
        run: |
          set -o errexit -o nounset -o pipefail
          PYTHON="${{ steps.install-deps.outputs.python }}"
          "$PYTHON" -m tox --notest -e "${{ matrix.tox_env }}"
      - name: Run tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o errexit -o nounset -o pipefail
          PYTHON="${{ steps.install-deps.outputs.python }}"

          "$PYTHON" -m tox -e "${{ matrix.tox_env }}"

  macos:
    name: macos ${{ matrix.tox_env }}
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
    runs-on: macos-15
    timeout-minutes: 30
    env:
      MITOGEN_TEST_SKIP_CONTAINER_TESTS: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          # - tox_env: py315-m_lcl-ans14
          #   python_version: '3.15.0-beta.2'
          # - tox_env: py315-m_lcl-ans14-s_lin
          #   python_version: '3.15.0-beta.2'

          - tox_env: py315-m_mtg
            python_version: '3.15.0-beta.2'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
        if: ${{ matrix.python_version }}
      - run: .ci/show_python_versions
      - run: .ci/install_sshpass ${{ matrix.sshpass_version }}
        if: ${{ matrix.sshpass_version }}
      - run: .ci/setup_ssh_key_localhost
        if: ${{ contains(matrix.tox_env, 'm_lcl') }}
      - run: .ci/setup_ssh_key_mitogen__has_sudo_pubkey
      - run: .ci/setup_sudoers_defaults
        if: ${{ contains(matrix.tox_env, 'm_mtg') }}
      - name: Install deps
        id: install-deps
        run: |
          set -o errexit -o nounset -o pipefail
          source .ci/bash_functions
          PYTHON="$(toxenv-python '${{ matrix.tox_env }}')"

          "$PYTHON" -m pip install -r "tests/requirements-tox.txt"
          echo "python=$PYTHON" >> $GITHUB_OUTPUT
      - name: Create environments
        run: |
          set -o errexit -o nounset -o pipefail
          PYTHON="${{ steps.install-deps.outputs.python }}"
          "$PYTHON" -m tox --notest -e "${{ matrix.tox_env }}"
      - name: Run tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o errexit -o nounset -o pipefail
          PYTHON="${{ steps.install-deps.outputs.python }}"

          "$PYTHON" -m tox -e "${{ matrix.tox_env }}"

  # https://github.com/marketplace/actions/alls-green
  check:
    if: always()
    needs:
      - u2404
      - macos
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
