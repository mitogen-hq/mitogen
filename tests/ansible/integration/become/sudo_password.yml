# Verify passwordful sudo behaviour

- name: integration/become/sudo_password.yml
  hosts: test-targets
  tasks:

    - name: Ensure sudo password absent but required.
      become: true
      become_user: mitogen__pw_required
      command:
        cmd: whoami
      register: out
      changed_when: false
      ignore_errors: true
      when:
        # https://github.com/ansible/ansible/pull/70785
        - ansible_facts.distribution not in ["MacOSX"]
          or ansible_version.full is version("2.11", ">=", strict=True)
          or is_mitogen

    - assert:
        that: |
          out.failed and (
            ('password is required' in out.msg) or
            ('Missing sudo password' in out.msg) or
            ('password is required' in out.module_stderr)
          )
        fail_msg: |
          out={{ out }}
      when:
        # https://github.com/ansible/ansible/pull/70785
        - ansible_facts.distribution not in ["MacOSX"]
          or ansible_version.full is version("2.11", ">=", strict=True)
          or is_mitogen

    - name: Ensure password sudo incorrect.
      become: true
      become_user: mitogen__pw_required
      command:
        cmd: whoami
      register: out
      vars:
        ansible_become_pass: nopes
      changed_when: false
      ignore_errors: true
      when:
        # https://github.com/ansible/ansible/pull/70785
        - ansible_facts.distribution not in ["MacOSX"]
          or ansible_version.full is version("2.11", ">=", strict=True)
          or is_mitogen

    - assert:
        that: |
          out.failed and (
            ('Incorrect sudo password' in out.msg) or
            ('sudo password is incorrect' in out.msg)
          )
        fail_msg: |
          out={{ out }}
      when:
        # https://github.com/ansible/ansible/pull/70785
        - ansible_facts.distribution not in ["MacOSX"]
          or ansible_version.full is version("2.11", ">=", strict=True)
          or is_mitogen

    - block:
        - name: Ensure password sudo succeeds
          become: true
          become_user: mitogen__pw_required
          vars:
            ansible_become_pass: pw_required_password
          command:
            cmd: whoami
          changed_when: false
          register: become_sudo_password_success_whoami

        - assert:
            that:
              - become_sudo_password_success_whoami.stdout == 'mitogen__pw_required'
            fail_msg: |
              become_sudo_password_success_whoami={{ become_sudo_password_success_whoami }}
      when:
        # https://github.com/ansible/ansible/pull/70785
        - ansible_facts.distribution not in ["MacOSX"]
          or ansible_version.full is version("2.11", ">=", strict=True)
          or is_mitogen
  tags:
    - sudo
    - sudo_password
