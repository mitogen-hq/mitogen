# issue #548
# Each case is followed by mitogen_via= case to test hostvars method.


# When no ansible_connection= is set, transport comes via ansible.cfg ("smart"
# is parsed away to either paramiko or ssh).
- name: integration/transport_config/transport__smart.yml
  hosts: tc-transport-smart
  tasks:
  - meta: end_play
    when:
      # Ansible 14 (ansible-core 2.21) removed paramiko connections, 'smart'
      # is now redirected to ansible.legacy.ssh in ansible_builtin_runtime.yml
      # before Mitogen can, https://github.com/ansible/ansible/pull/86757
      - ansible_version_major_minor is version('2.21', '>=', strict=True)
  - include_tasks: ../_mitogen_only.yml
  - {mitogen_get_stack: {}, register: out}
  - assert_equal:
      left: out.result[0].method
      right: "ssh"
  tags:
    - mitogen_only

- name: tc-transport-local via tc-transport-smart
  hosts: tc-transport-local
  vars: {mitogen_via: tc-transport-smart}
  tasks:
  - meta: end_play
    when:
      # Ansible 14 (ansible-core 2.21) removed paramiko connections, 'smart'
      # is now redirected to ansible.legacy.ssh in ansible_builtin_runtime.yml
      # before Mitogen can, https://github.com/ansible/ansible/pull/86757
      - ansible_version_major_minor is version('2.21', '>=', strict=True)
  - include_tasks: ../_mitogen_only.yml
  - {mitogen_get_stack: {}, register: out}
  - assert_equal:
      left: out.result[0].method
      right: "ssh"
  - assert_equal:
      left: out.result[1].method
      right: "local"
  tags:
    - mitogen_only


