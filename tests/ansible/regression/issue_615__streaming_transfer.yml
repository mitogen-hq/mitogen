# issue #615: 'fetch' with become: was internally using slurp.

- name: regression/issue_615_streaming_transfer.yml
  hosts: test-targets
  gather_facts: no
  # Without Mitogen this causes Ansible to use the slurp module, which is *slow*
  become: true
  vars:
    mitogen_ssh_compression: false
    controller_file_path: "/tmp/fetch-{{ inventory_hostname }}-512mb.txt"
    target_file_path: /tmp/mitogen-test-512mb.txt
  tasks:
    - include_tasks: _mitogen_only.yml
    - block:
        - name: Create test file on target
          script:
            cmd: write_512mb_test_file "{{ target_file_path }}"
            executable: "{{ ansible_facts.discovered_interpreter_python }}"
            creates: "{{ target_file_path }}"
          register: target_file_task

        - debug:
            var: target_file_task

        - name: Fetch test file
          fetch:
            src: "{{ target_file_path }}"
            dest: "{{ controller_file_path }}"
            flat: true

        - name: Cleanup target
          file:
            path: "{{ target_file_path }}"
            state: absent

        - name: Cleanup controller
          file:
            path: "{{ controller_file_path }}"
            state: absent
          become: false
          delegate_to: localhost
  tags:
    - issue_615
    - mitogen_only
