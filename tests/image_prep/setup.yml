#!/usr/bin/env ansible-playbook

- name: Run containers
  hosts: all
  # strategy: mitogen_free
  gather_facts: false
  pre_tasks:
    - name: Fetch container base images
      docker_image:
        name: "{{ docker_base }}"
        source: pull  # Added in Ansible 2.8, required circa 2.12
        pull:
          platform: linux/amd64
      delegate_to: localhost
  roles:
    - role: container_start
    - role: container_wait

- import_playbook: _container_setup.yml
- import_playbook: _user_accounts.yml

- name: Finalize containers
  hosts: all
  gather_facts: false
  roles:
    - role: container_commit
    - role: container_stop
