ansible_version_major_minor: "{{ ansible_version.major }}.{{ ansible_version.minor }}"

common_packages:
  - acl
  - openssh-server
  - rsync
  - strace

container_image_name: "{{ container_registry }}/{{ inventory_hostname }}-test"
container_image_tag: "2026.04"
container_registry: ghcr.io/mitogen-hq

mitogen_test_groups:
  - name: mitogen__group
  - name: mitogen__sudo_nopw

mitogen_test_users:
  - name: mitogen__has_sudo
    groups: ['mitogen__group', '{{ sudo_group[ansible_distribution] }}']
  - name: mitogen__has_sudo_nopw
    groups: ['mitogen__group', 'mitogen__sudo_nopw']
  - name: mitogen__has_sudo_pubkey
    groups: ['mitogen__group', '{{ sudo_group[ansible_distribution] }}']
  - name: mitogen__pw_required
  - name: mitogen__readonly_homedir
  - name: mitogen__require_tty
  - name: mitogen__require_tty_pw_required
  - name: mitogen__permdenied
  - name: mitogen__slow_user
  - name: mitogen__webapp
  - name: mitogen__sudo1
    groups: ['mitogen__group', 'mitogen__sudo_nopw']
  - name: mitogen__sudo2
    groups: ['mitogen__group', '{{ sudo_group[ansible_distribution] }}']
  - name: mitogen__sudo3
    groups: ['mitogen__group', '{{ sudo_group[ansible_distribution] }}']
  - name: mitogen__sudo4
    groups: ['mitogen__group', '{{ sudo_group[ansible_distribution] }}']
  - name: mitogen__user1
  - name: mitogen__user2
  - name: mitogen__user3
  - name: mitogen__user4
  - name: mitogen__user5

sudo_group:
  MacOSX: admin
  Debian: sudo
  Ubuntu: sudo
  CentOS: wheel
  AlmaLinux: wheel

system_groups:
  Darwin: ['com.apple.access_ssh']
  Linux: []

user_policies_max_failed_logins: 1000
user_policies_users: "{{ mitogen_test_users }}"
